<!DOCTYPE html>
<html>
<head>
  <title>Meu Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #343541;
      color: white;
    }

    .chat {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .msg {
      padding: 12px;
      border-radius: 8px;
      margin: 10px 0;
      max-width: 70%;
    }

    .user {
      background: #0084ff;
      margin-left: auto;
    }

    .bot {
      background: #444654;
      margin-right: auto;
    }

    .input-area {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #40414f;
      padding: 10px;
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border: none;
      background: #19c37d;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="msg" placeholder="Digite sua mensagem..." />
  <button onclick="enviar()">Enviar</button>
</div>

<script>
function adicionarMensagem(texto, classe) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + classe;
  div.innerText = texto;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function enviar() {
  const input = document.getElementById("msg");
  const mensagem = input.value;

  if (!mensagem) return;

  adicionarMensagem(mensagem, "user");
  input.value = "";

  fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ mensagem })
  })
  .then(res => res.json())
  .then(data => {
    adicionarMensagem(data.resposta, "bot");
  });
}
</script>

</body>
</html>
