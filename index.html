<!DOCTYPE html>
<html>
<head>
  <title>Chat IA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #343541;
      color: white;
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      padding: 12px;
      border-radius: 10px;
      margin: 10px 0;
      max-width: 70%;
      animation: fade 0.3s ease;
    }

    .user {
      background: #0084ff;
      margin-left: auto;
    }

    .bot {
      background: #444654;
      margin-right: auto;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #40414f;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px;
      border: none;
      background: #19c37d;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div class="input-area">
  <input id="msg" placeholder="Digite sua mensagem..." />
  <button onclick="enviar()">Enviar</button>
</div>

<script>
function addMsg(texto, tipo) {
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.innerText = texto;
  document.getElementById("chat").appendChild(div);
}

function enviar() {
  const input = document.getElementById("msg");
  const mensagem = input.value;

  if (!mensagem) return;

  addMsg(mensagem, "user");
  input.value = "";

  addMsg("Digitando...", "bot");

  fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ mensagem })
  })
  .then(res => res.json())
  .then(data => {
    const chat = document.getElementById("chat");
    chat.lastChild.remove(); // remove "digitando"
    addMsg(data.resposta, "bot");
  });
}
</script>

</body>
</html>
